[broker]
type = "mock" # mock | moomoo
env = "SIMULATE"
host = "127.0.0.1"
port = 11111
market = "US"

[data]
source = "sample" # sample | moomoo

[account]
base_currency = "USD"
initial_cash = 10000

[risk]
min_confidence = 0.55
max_position_pct = 0.10
max_order_value = 500
max_daily_loss_pct = 0.02
max_drawdown_pct = 0.08
risk_per_trade_pct = 0.005
min_cash_pct = 0.20
stop_loss_pct = 0.05
take_profit_pct = 0.15
max_holding_days = 20
max_open_positions = 8
whole_share_only = true

[strategy]
name = "moving_average_cross"
symbols = [
  "US.NVDA", "US.AMD", "US.AVGO", "US.TSM", "US.META",
  "US.AMZN", "US.GOOGL", "US.PLTR", "US.TSLA", "US.MSFT", "US.AAPL"
]
fast_window = 5
slow_window = 20
lookback_days = 140
ai_score_min = 55
